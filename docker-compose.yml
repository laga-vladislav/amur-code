services:
  backend:
    build:
      context: ./backend
    container_name: amur-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - backend_storage:/app/storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/api/health').status == 200 else 1)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
    container_name: amur-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

volumes:
  backend_storage:
